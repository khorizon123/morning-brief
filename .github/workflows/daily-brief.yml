name: Morning Brief

on:
  schedule:
    # Fires 4x an hour, deliberately NOT on the :00 minute -- GitHub's own
    # docs warn that :00 is the most congested slot and scheduled runs can be
    # delayed or dropped entirely during high load. On 2026-07-10, GitHub
    # dropped BOTH of the (then two) offset triggers inside the 7am hour, so
    # nothing sent that day -- four spread-out offsets makes a full-hour
    # miss much less likely. This is free either way: public repos get
    # unlimited Actions minutes, and each skipped (non-7am) run only takes
    # ~15-20s. run.js checks whether it's actually 7am in TARGET_TIMEZONE
    # and skips otherwise, and separately guards against sending twice if
    # more than one trigger lands in the target hour.
    - cron: '7 * * * *'
    - cron: '22 * * * *'
    - cron: '37 * * * *'
    - cron: '52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Configure git identity for the audio commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "Morning Brief Bot"

      - name: Run Morning Brief
        env:
          # Only the actual cron schedule respects the "is it 7am yet"
          # gate -- manual (workflow_dispatch) runs always execute for real,
          # since that's the whole point of triggering one by hand.
          SCHEDULED_RUN: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          TARGET_TIMEZONE: ${{ vars.TARGET_TIMEZONE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
        run: node run.js --live
