name: Morning Brief

on:
  schedule:
    # Fires twice an hour, deliberately NOT on the :00 minute -- GitHub's own
    # docs warn that :00 is the most congested slot and scheduled runs can be
    # delayed or dropped entirely during high load. Two offset times per hour
    # gives redundancy in case one is dropped. run.js checks whether it's
    # actually 7am in TARGET_TIMEZONE and skips otherwise, and separately
    # guards against sending twice if both land in the target hour.
    - cron: '12 * * * *'
    - cron: '42 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Configure git identity for the audio commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "Morning Brief Bot"

      - name: Run Morning Brief
        env:
          # Only the actual cron schedule respects the "is it 7am yet"
          # gate -- manual (workflow_dispatch) runs always execute for real,
          # since that's the whole point of triggering one by hand.
          SCHEDULED_RUN: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          TARGET_TIMEZONE: ${{ vars.TARGET_TIMEZONE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
        run: node run.js --live
